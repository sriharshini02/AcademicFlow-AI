server {
    listen 80;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # 🟢 THE MAGIC FIX:
        # First try to find the actual file ($uri), 
        # then try to find a folder ($uri/),
        # if neither exists, serve index.html (so React can handle the route)
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}